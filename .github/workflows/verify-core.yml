name: Synaxion Core Verify

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: verify:core
        run: node verification/run.mjs
      - name: verify:reference (nextjs-minimal)
        run: node verification/run.mjs --full
        env:
          SYNAXION_PROJECT_ROOT: reference/nextjs-minimal
      - name: verify:reference (express-api-minimal)
        run: node verification/run.mjs --full
        env:
          SYNAXION_PROJECT_ROOT: reference/express-api-minimal
      - name: scaffold smoke (express-api profile)
        run: node verification/scaffold-profile-smoke.mjs --profile=express-api
